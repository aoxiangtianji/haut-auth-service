name: Build OpenWrt Package

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.format }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # opkg / .ipk format: covers OpenWrt 21.02 - 24.10
          - arch: x86_64-24.10-SNAPSHOT
            format: ipk
          # apk / .apk format: covers OpenWrt snapshot / 25.x and later
          - arch: x86_64
            format: apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: immortalwrt/gh-action-sdk@master
        env:
          ARCH: ${{ matrix.arch }}
          PACKAGES: haut-auth

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            bin/packages/**/haut-auth*.ipk
            bin/packages/**/haut-auth*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
